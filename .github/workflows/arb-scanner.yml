name: arb-scanner

on:
  schedule:
    # Каждые 15 минут (GitHub Actions cron — best effort, может задерживаться)
    - cron: '*/15 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'dexbot/arb_scanner.py'
      - '.github/workflows/arb-scanner.yml'

concurrency:
  group: arb-scanner
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scan:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run arb scanner (one pass)
        run: python -m dexbot.arb_scanner --once

      - name: Show short summary
        run: python -m dexbot.arb_scanner --summary || true

      - name: Commit CSV changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add arb_opportunities.csv
          if git diff --cached --quiet; then
            echo "Нет новых записей — пропускаем коммит"
          else
            count=$(tail -n +2 arb_opportunities.csv | wc -l | tr -d ' ')
            git commit -m "arb-scanner: +$(git diff --cached --numstat arb_opportunities.csv | awk '{print $1}') записей (всего $count)"
            git pull --rebase origin main || true
            git push origin HEAD:main
          fi
