name: discovery

on:
  schedule:
    # Sunday 03:00 UTC. Re-scores all active wallets weekly.
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      days:
        description: 'Lookback window in days'
        default: '30'
        required: false

concurrency:
  group: discovery
  cancel-in-progress: false

jobs:
  rescore:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Harvest + score wallets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}
        run: |
          if [ -z "$DATABASE_URL" ] || [ -z "$HELIUS_API_KEY" ]; then
            echo "Required secrets not set; skipping."
            exit 0
          fi
          echo ">>> Harvest new candidates from recent pools"
          python -m dexbot.discovery harvest --max-pools 50 --days 14
          echo ">>> Score only stale/new wallets (cap 100 per run)"
          # --stale-only: scores wallets never scored OR last_scored_at > 7 days ago.
          # --max 100:    hard cap to keep runtime predictable as watch-list grows.
          # Старые ещё актуальные оценки не трогаем — экономим Helius credits
          # и укладываемся в 25-минутный таймаут даже на 200+ wallet'ов в БД.
          python -m dexbot.discovery score --all --stale-only --max 100 \
            --days "${{ inputs.days || 30 }}"
          echo ">>> Top 30 ranked"
          python -m dexbot.discovery list --limit 30
