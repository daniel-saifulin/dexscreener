# fly.io конфигурация для dexbot-webhook
# Запускается командой:  fly launch --copy-config --name dexbot-webhook
# Затем:                  fly secrets set DATABASE_URL=... HELIUS_API_KEY=...
# Деплой:                 fly deploy

app = "dexbot-webhook"          # измени если имя занято; fly предложит другое при `fly launch`
primary_region = "iad"          # us-east, близко к Neon. Изменить на ближайший к тебе если надо.

[build]

[env]
  LOG_LEVEL = "INFO"

[http_service]
  internal_port = 8080
  force_https = true
  # Важно: keep-alive чтобы машина не засыпала между webhook-вызовами
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

# Healthcheck через GET /health
[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  protocol = "http"
  timeout = "5s"
